<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoD Karaktärsblad v13.0</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: rgba(40, 40, 40, 0.95);
            --text-color: #f0f0f0;
            --accent-color: #4ca300;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-color);
            margin: 0; padding: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('dragonbane_banner.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: var(--bg-color);
        }

        .room-dropdown {
            position: fixed; top: 0; left: 0; right: 0; z-index: 4000;
            background: rgba(0, 0, 0, 0.95); border-bottom: 1px solid var(--accent-color);
            transition: max-height 0.3s; max-height: 50px; overflow: hidden;
        }
        .room-dropdown.open { max-height: 250px; }
        .room-header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; cursor: pointer; }
        
        .container {
            max-width: 900px; margin: 20px auto 200px auto; 
            background: var(--card-bg); border: 1px solid var(--accent-color);
            border-radius: 12px; padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .section { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--accent-color); }
        h3 { color: var(--accent-color); margin-top: 0; font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }

        input[type="text"], input[type="number"], textarea { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 4px; width: 100%; 
        }

        .stat-box { background: #0a0a0a; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .stat-box input { border: none; border-bottom: 2px solid var(--accent-color); font-size: 1.4rem; font-weight: bold; width: 60px; background: transparent; text-align: center; }

        .derived-stats { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .derived-box { flex: 1; min-width: 120px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .derived-val { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); margin-top: 5px; }
        label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }

        .skill-item { display: grid; grid-template-columns: 2fr 45px 45px 45px; align-items: center; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 4px; margin-bottom: 4px; font-size: 0.85rem; }
        .skill-val { font-weight: bold; color: var(--accent-color); text-align: center; }

        /* --- ACTION TRAY --- */
        .dice-tray {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 15, 15, 0.98); border-top: 2px solid var(--accent-color);
            padding: 15px; display: flex; flex-direction: column; align-items: center;
            z-index: 2000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dice-tray.minimized { transform: translateY(100%); }

        .tray-tabs {
            position: absolute; top: -35px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 8px; pointer-events: none;
        }
        .tray-tab {
            background: #111; color: #777; padding: 8px 20px; 
            border: 1px solid var(--accent-color); border-bottom: none;
            border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; font-size: 0.7rem;
            pointer-events: auto; transition: 0.2s;
        }
        .tray-tab.active { background: var(--accent-color); color: white; transform: translateY(-2px); }

        .tab-content { display: none; width: 100%; max-width: 600px; }
        .tab-content.active { display: flex; flex-direction: column; }

        .inv-nav { display: flex; gap: 5px; margin-bottom: 10px; }
        .inv-btn { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #888; cursor: pointer; border-radius: 5px; }
        .inv-btn.active { color: var(--accent-color); border-color: var(--accent-color); background: #1a1a1a; }
        
        .dice-result-big { font-size: 2.2rem; font-weight: bold; color: var(--accent-color); text-align: center; margin-bottom: 15px; min-height: 50px; }
        .dice-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        
        .log-container { width: 100%; height: 160px; overflow-y: scroll; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #222; }
        .log-entry { padding: 6px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="room-dropdown" id="roomMenu">
        <div class="room-header" onclick="document.getElementById('roomMenu').classList.toggle('open')">
            <span id="connectionStatus">🔴 Ej ansluten (Klicka här)</span>
            <span>▼</span>
        </div>
        
        <div class="room-content">
            <input type="text" id="roomName" placeholder="Rumsnamn..." value="MittRum">
            <button onclick="connectToRoom()" style="background: var(--accent-color); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 20px; margin-top: 10px; font-weight: bold;">ANSLUT TILL RUM</button>
            <div id="userList" style="margin-top: 10px; font-size: 0.8rem;"></div>
        </div>
    </div>
    <div style="text-align: center; padding: 80px 20px 10px 20px;">
        <h1 style="margin: 0; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,1);">⚔️ Drakar och Demoner</h1>
        <h2 style="color: #ffcc00; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);">Digitalt Karaktärsblad</h2>
    </div>
    <div class="container">
        <div class="section grid-3">
            <div class="input-group"><label>Namn</label><input type="text" id="charName" class="save-field"></div>
            <div class="input-group"><label>Släkte</label><input type="text" id="kin" class="save-field"></div>
            <div class="input-group"><label>Yrke</label><input type="text" id="profession" class="save-field"></div>
        </div>
        
        <div class="section">
            <h3>Grundegenskaper</h3>
            <div class="grid-6">
                <div class="stat-box"><label>STY</label><input type="number" id="sty" class="save-field attr" value="10"></div>
                <div class="stat-box"><label>FYS</label><input type="number" id="fys" class="save-field attr" value="10"></div>
                <div class="stat-box"><label>SMI</label><input type="number" id="smi" class="save-field attr" value="10"></div>
                <div class="stat-box"><label>INT</label><input type="number" id="int" class="save-field attr" value="10"></div>
                <div class="stat-box"><label>PSY</label><input type="number" id="psy" class="save-field attr" value="10"></div>
                <div class="stat-box"><label>KAR</label><input type="number" id="kar" class="save-field attr" value="10"></div>
            </div>

            <div class="derived-stats">
                <div class="derived-box">
                    <label>Nuvarande KP</label>
                    <div class="stat-box" style="margin-top:5px; background:transparent; border:none;"><input type="number" id="cur-kp" class="save-field" value="10" style="border-bottom: 2px solid #ff4444;"></div>
                </div>
                <div class="derived-box">
                    <label>Max KP (FYS)</label>
                    <div id="out-kp" class="derived-val">10</div>
                </div>
                <div class="derived-box">
                    <label>Nuvarande VP</label>
                    <div class="stat-box" style="margin-top:5px; background:transparent; border:none;"><input type="number" id="cur-vp" class="save-field" value="10" style="border-bottom: 2px solid #44aaff;"></div>
                </div>
                <div class="derived-box">
                    <label>Max VP (PSY)</label>
                    <div id="out-vp" class="derived-val">10</div>
                </div>
                <div class="derived-box">
                    <label>🎒 Bärförmåga</label>
                    <div id="out-carry" class="derived-val">5</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Ekonomi & Pengar</h3>
            <div class="grid-3">
                <div class="stat-box"><label>Guld</label><br><input type="number" id="money-gold" class="save-field" value="0"></div>
                <div class="stat-box"><label>Silver</label><br><input type="number" id="money-silver" class="save-field" value="0"></div>
                <div class="stat-box"><label>Koppar</label><br><input type="number" id="money-copper" class="save-field" value="0"></div>
            </div>
        </div>

        <div class="section">
            <h3>Allmänna Färdigheter</h3>
            <div id="general-skills"></div>
        </div>

        <div class="section">
            <h3>Vapenfärdigheter</h3>
            <div id="weapon-skills"></div>
        </div>
    </div>

    <div class="dice-tray minimized" id="actionTray">
        <div class="tray-tabs">
            <div class="tray-tab" id="tab-btn-dice" onclick="toggleTray('dice')">🎲 TÄRNINGAR</div>
            <div class="tray-tab" id="tab-btn-log" onclick="toggleTray('log')">📜 LOGG</div>
            <div class="tray-tab" id="tab-btn-inv" onclick="toggleTray('inv')">🎒 RYGGSÄCK</div>
        </div>
    
        <div id="content-dice" class="tab-content">
            <div id="dice-result" class="dice-result-big">Klar</div>
            <div class="dice-buttons">
                <button class="dice-btn" onclick="rollDice(4)">T4</button>
                <button class="dice-btn" onclick="rollDice(6)">T6</button>
                <button class="dice-btn" onclick="rollDice(8)">T8</button>
                <button class="dice-btn" onclick="rollDice(10)">T10</button>
                <button class="dice-btn" onclick="rollDice(12)">T12</button>
                <button class="dice-btn" onclick="rollDice(20)">T20</button>
            </div>
        </div>
    
        <div id="content-log" class="tab-content">
            <div id="dice-history-list" class="log-container"></div>
        </div>
    
        <div id="content-inv" class="tab-content">
            <div class="inv-nav">
                <button class="inv-btn active" id="btn-sub-weapons" onclick="showInvPanel('weapons')">Vapen</button>
                <button class="inv-btn" id="btn-sub-items" onclick="showInvPanel('items')">Prylar</button>
            </div>
            <div id="panel-weapons" style="display:block;"><textarea id="inv-weapons" class="save-field" placeholder="Vapen, skada & egenskaper..." style="height:120px"></textarea></div>
            <div id="panel-items" style="display:none;"><textarea id="inv-items" class="save-field" placeholder="Utrustning, rep, facklor..." style="height:120px"></textarea></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, serverTimestamp, set, onDisconnect, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApQWEuMm5hCpp174145GgcdUOGEmfO2RU",
        authDomain: "dodspel.firebaseapp.com",
        projectId: "dodspel",
        databaseURL: "https://dodspel-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const genSkills = [
        {n:"Dyrka lås", a:"smi"}, {n:"Fingerfärdighet", a:"smi"}, {n:"Hantverk", a:"sty"},
        {n:"Hoppa & Klättra", a:"smi"}, {n:"Kulturkännedom", a:"int"}, {n:"Läkekonst", a:"int"},
        {n:"Lärdom", a:"int"}, {n:"Rida", a:"smi"}, {n:"Sjökunnighet", a:"int"},
        {n:"Smyga", a:"smi"}, {n:"Undvika", a:"smi"}, {n:"Uppmärksamhet", a:"int"},
        {n:"Överlevnad", a:"int"}, {n:"Övertala", a:"kar"}
    ];
    const weapSkills = [
        {n:"Armborst", a:"smi"}, {n:"Båge", a:"smi"}, {n:"Kastvapen", a:"smi"}, 
        {n:"Klubba", a:"sty"}, {n:"Kniv", a:"smi"}, {n:"Sköld", a:"sty"}, 
        {n:"Slagsmål", a:"sty"}, {n:"Spjut", a:"sty"}, {n:"Svärd", a:"sty"}, {n:"Yxa", a:"sty"}
    ];

    function createSkills(list, targetId) {
        const target = document.getElementById(targetId);
        list.forEach(s => {
            const id = s.n.toLowerCase().replace(/ /g, '-');
            target.innerHTML += `<div class="skill-item"><div>${s.n}</div><div class="skill-base" data-attr="${s.a}">3</div><input type="checkbox" id="t-${id}" class="save-field"><div class="skill-val">3</div></div>`;
        });
    }
    createSkills(genSkills, 'general-skills');
    createSkills(weapSkills, 'weapon-skills');

    window.toggleTray = (t) => {
        const tray = document.getElementById('actionTray');
        const content = document.getElementById('content-'+t);
        const alreadyOpen = !tray.classList.contains('minimized') && content.classList.contains('active');

        if (alreadyOpen) {
            tray.classList.add('minimized');
        } else {
            document.querySelectorAll('.tab-content, .tray-tab').forEach(el => el.classList.remove('active'));
            content.classList.add('active');
            document.getElementById('tab-btn-'+t).classList.add('active');
            tray.classList.remove('minimized');
        }
    };

    window.showInvPanel = (p) => {
        document.getElementById('panel-weapons').style.display = p === 'weapons' ? 'block' : 'none';
        document.getElementById('panel-items').style.display = p === 'items' ? 'block' : 'none';
        document.querySelectorAll('.inv-btn').forEach(b => b.classList.toggle('active', b.id.includes(p)));
    };

    window.rollDice = (sides) => {
        const room = document.getElementById('roomName').value;
        const name = document.getElementById('charName').value || "Anonym";
        const res = Math.floor(Math.random() * sides) + 1;
        push(ref(db, `rooms/${room}/rolls`), { user: name, dice: "T"+sides, val: res });
    };

    window.connectToRoom = () => {
        const room = document.getElementById('roomName').value;
        onValue(ref(db, `rooms/${room}/users`), s => {
            const u = s.val() ? Object.keys(s.val()) : [];
            document.getElementById('userList').innerHTML = "👥 " + u.join(', ');
        });
        onChildAdded(query(ref(db, `rooms/${room}/rolls`), limitToLast(20)), s => {
            const d = s.val();
            let icon = d.dice === "T20" ? (d.val === 1 ? " 🔥" : (d.val === 20 ? " 💀" : "")) : "";
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span>${d.user}</span><strong>${d.val}${icon}</strong>`;
            document.getElementById('dice-history-list').prepend(entry);
            document.getElementById('dice-result').innerHTML = d.val + icon;
        });
        document.getElementById('connectionStatus').innerText = "🟢 " + room;
        document.getElementById('roomMenu').classList.remove('open');
        window.syncSheetToFirebase();
    };

    function calc() {
        const v = (id) => {
            const el = document.getElementById(id);
            return el ? parseInt(el.value) || 0 : 0;
        };
        const vt = (id) => {
            const el = document.getElementById(id);
            return el ? el.innerText : "0";
        };

        // Autoberäknar Max-fälten
        document.getElementById('out-kp').innerText = v('fys');
        document.getElementById('out-vp').innerText = v('psy');
        document.getElementById('out-carry').innerText = Math.ceil(v('sty') / 2);
        
        document.querySelectorAll('.skill-item').forEach(row => {
            const baseEl = row.querySelector('.skill-base');
            const valEl = row.querySelector('.skill-val');
            const cb = row.querySelector('input[type="checkbox"]');
            const attrVal = v(baseEl.dataset.attr);
            const base = Math.max(3, Math.min(7, Math.floor((attrVal - 1) / 3) + 2));
            baseEl.innerText = base;
            valEl.innerText = cb.checked ? base * 2 : base;
        });

        window.syncSheetToFirebase();
    }

    window.syncSheetToFirebase = function() {
        const room = document.getElementById('roomName').value;
        const charName = document.getElementById('charName').value || "Anonym";
        const status = document.getElementById('connectionStatus').innerText;

        if (room && status.includes("🟢")) {
            set(ref(db, `rooms/${room}/sheets/${charName}`), {
                currentKp: document.getElementById('cur-kp').value,
                maxKp: document.getElementById('out-kp').innerText,
                currentVp: document.getElementById('cur-vp').value,
                maxVp: document.getElementById('out-vp').innerText,
                profession: document.getElementById('profession').value,
                gold: document.getElementById('money-gold').value,
                silver: document.getElementById('money-silver').value,
                copper: document.getElementById('money-copper').value,
                lastUpdate: serverTimestamp()
            });
        }
    };

    document.querySelectorAll('.save-field, .attr').forEach(f => {
        const saved = localStorage.getItem(f.id);
        if(saved !== null) f.type === 'checkbox' ? f.checked = saved==='true' : f.value = saved;
        f.oninput = () => { localStorage.setItem(f.id, f.type==='checkbox' ? f.checked : f.value); calc(); };
    });
    calc();
</script>
</body>
</html>
