<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakar och Demoner - Hub</title>
    <style>
        /* DENNA RAD FIXAR KNAPPARNA */
        * { box-sizing: border-box; }

        :root {
            --bg-color: #121212;
            --accent-color: #4ca300;
            --text-color: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('dragonbane_banner.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-color);
        }

        .menu-card {
            background: rgba(20, 20, 20, 0.95);
            padding: 40px 30px;
            border-radius: 15px;
            border: 1px solid var(--accent-color);
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            max-width: 400px; /* Lite smalare för bättre fokus */
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 { margin-bottom: 10px; font-size: 1.8rem; letter-spacing: 1px; }
        p { color: #888; margin-bottom: 30px; font-style: italic; font-size: 0.9rem; }

        .btn-choice {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-color);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .btn-choice:hover {
            background: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(76, 163, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="menu-card">
        <h1>⚔️ Dragonbane Digital</h1>
        <p>Välj din roll vid bordet</p>
        <a href="spelare.html" class="btn-choice">🛡️ Spelare</a>
        <a href="sl.html" class="btn-choice">📜 Spelledare</a>
        <p>by: Matfors</p>
    </div>
</body>
</html>
