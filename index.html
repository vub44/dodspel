<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakar och Demoner - Meny</title>
    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #4ca300;
            --text-color: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('dragonbane_banner.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-color);
        }

        .menu-card {
            background: rgba(30, 30, 30, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--accent-color);
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin-bottom: 30px; letter-spacing: 2px; }

        .btn-choice {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-choice:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(76, 163, 0, 0.4);
        }

        .footer { margin-top: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <div class="menu-card">
        <h1>⚔️ Välj din roll</h1>
        
        <a href="spelare.html" class="btn-choice">🛡️ SPELARE</a>
        <a href="sl.html" class="btn-choice">📜 SPELLEDARE</a>

        <div class="footer">Drakar och Demoner Digitalt Verktyg</div>
    </div>

</body>
</html>
